[github_app]
# Commands run automatically when a PR is opened.
# /improve runs the code-suggestions tool, which is what evaluates auto-approval
# (see the auto_approve_* settings under [config]). It's only on open, not on
# push, to keep Qodo's per-PR usage low — re-evaluation happens for a freshly
# opened PR, not on every commit.
pr_commands = [
    "/agentic_describe",
    "/agentic_review",
    "/improve",
]

# Re-run commands when new commits are pushed to the PR.
handle_push_trigger = true

# Commands run automatically on push (requires handle_push_trigger = true).
push_commands = [
    "/agentic_review",
]

[config]
# Skip automated reviews on bot-authored PRs (e.g. dependency bumps).
# Qodo auto-detects most bots; these are listed explicitly to be safe.
ignore_pr_authors = [
    "dependabot[bot]",
    "renovate[bot]",
]

# Optional: also skip reviews on chore/ci PRs by title (regex list).
# Left commented so maintainers can opt in. Note that bot dependency bumps
# are already covered by ignore_pr_authors above.
# ignore_pr_title = ["^chore", "^ci"]

# Product labels are applied by CodeRabbit (see .coderabbit.yaml), so Qodo's
# label tooling is intentionally left off to avoid two tools fighting over labels.

# Auto-approve a PR when Qodo finds nothing to fix. enable_auto_approval is the
# required master switch (off by default). Both conditions below are evaluated by
# the /improve tool (see pr_commands), so /improve must run for approval to fire,
# and these flags only take effect from the config file on the default branch:
#   - auto_approve_for_no_suggestions: approve when /improve yields zero suggestions.
#   - auto_approve_for_low_review_effort: approve when the estimated review effort
#     is at or below this score (1=trivial .. 5=very involved); 2 covers small PRs.
enable_auto_approval = true
auto_approve_for_no_suggestions = true
auto_approve_for_low_review_effort = 2

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 2
issues_user_guidelines = """
Apply the review framework in REVIEW_GUIDE.md. Flag, in priority order: (1) security vulnerabilities; (2) performance regressions in pnpm, pacquet, and pnpr; (3) violations of the repository's documented code style, comment rules, and engineering conventions in AGENTS.md (its "Code Style", "Comments", and "Conventions" sections) and CONTRIBUTING.md — for example: not throwing PnpmError for user-facing errors, swallowed or over-broad error handling, reimplementing logic an existing repo utility already provides, hardcoding configurable values that should flow through @pnpm/config and command options, or comments that merely restate the code. Do not repeat issues eslint already enforces. Surface only issues tied to changed code, and explain the exploit path, impact, hot path, or the specific documented rule that is violated.
"""
compliance_user_guidelines = """
Enforce the security, performance, and documented-convention contracts in REVIEW_GUIDE.md and in AGENTS.md (its "Code Style", "Comments", and "Conventions" sections).
"""
