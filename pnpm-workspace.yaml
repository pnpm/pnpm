  - pacquet/tasks/registry-mock
  - '!**/example/**'
  - '!**/test/**'
  - '!pnpm11/resolving/local-resolver/example-package/**'

allowBuilds:
  core-js: false
  esbuild: true
  fuse-native: true
  ghooks: true
  msgpackr-extract: true
  unrs-resolver: true

auditConfig:
  ignoreGhsas:
    - GHSA-2g4f-4pwh-qvx6
    - GHSA-76c9-3jph-rj3q
    - GHSA-ffrw-9mx8-89p8
    - GHSA-mh29-5h37-fv8m
    - GHSA-w5hq-g745-h8pq
    # GHSA-h67p-54hq-rp68: js-yaml quadratic-complexity DoS in merge key handling.
    # Patched only in >=4.1.2 with no v3 fix; @yarnpkg/parsers requires the js-yaml 3
    # API (yaml.safeLoad), so its transitive js-yaml cannot be upgraded.
    - GHSA-h67p-54hq-rp68

