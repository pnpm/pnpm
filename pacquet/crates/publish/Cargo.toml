[package]
name                 = "pacquet-publish"
description          = "Publish a package to an npm registry (the `pnpm publish` command)"
version              = "0.0.1"
publish              = false
authors.workspace    = true
edition.workspace    = true
homepage.workspace   = true
keywords.workspace   = true
license.workspace    = true
repository.workspace = true

[dependencies]
pacquet-diagnostics      = { workspace = true }
pacquet-executor         = { workspace = true }
pacquet-network          = { workspace = true }
pacquet-network-web-auth = { workspace = true }
pacquet-pack             = { workspace = true }
pacquet-reporter         = { workspace = true }

base64        = { workspace = true }
bytes         = { workspace = true }
derive_more   = { workspace = true }
dialoguer     = { workspace = true }
flate2        = { workspace = true }
miette        = { workspace = true }
node-semver   = { workspace = true }
pipe-trait    = { workspace = true }
reqwest       = { workspace = true }
serde         = { workspace = true }
serde_json    = { workspace = true }
sha2          = { workspace = true }
sigstore-sign = { workspace = true }
ssri          = { workspace = true }
tar           = { workspace = true }
url           = { workspace = true }

[dev-dependencies]
mockito           = { workspace = true }
pretty_assertions = { workspace = true }
tempfile          = { workspace = true }
tokio             = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

[lints]
workspace = true
