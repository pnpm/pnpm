name: Rust CI

# This workflow covers every Rust crate in the repo — pacquet and
# pnpr alike. They share the same cargo workspace, so `just test`,
# dylint, doc, etc. all see both stacks in one pass; running two
# workflows would just duplicate the work. Path filtering stays out
# of the workflow trigger so the `success` gate always runs; branch
# protection requires only that gate, which folds in every job below.

permissions:
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  changes:
    name: Rust CI / Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.manual.outputs.rust || steps.filter.outputs.rust }}
    steps:
      # Force the full Rust suite on manual runs and in the merge queue.
      # The merge queue tests the merged commit, so path filtering it away
      # would defeat the point; running unconditionally also guarantees the
      # `success` gate has a real (non-skipped) result to report.
      - name: Force Rust CI
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group'
        id: manual
        run: echo "rust=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'merge_group'
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'merge_group'
        id: filter
        with:
          filters: |
            rust:
              - 'pacquet/**'
              - 'pnpr/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'deny.toml'
              - 'dylint.toml'
              - '.taplo.toml'
              - '.typos.toml'
              - 'justfile'
              - '.cargo/**'
              - '.github/actions/rustup/**'
              - '.github/actions/binstall/**'
              - '.github/scripts/measure-command.mjs'
              - '.github/workflows/pacquet-ci.yml'

  test:
    name: Rust CI / Test / ${{ matrix.os_label }}
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_label: windows
          - os: ubuntu-latest
            os_label: ubuntu
          - os: macos-latest
            os_label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The nextest build holds a full set of debug artifacts in
      # target/, which no longer fits in the hosted runner's free disk —
      # the linker dies with ENOSPC / SIGBUS mid-build. Drop the
      # preinstalled toolchains this job never uses (~25 GB) before
      # compiling anything.
      - name: Free up runner disk space
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          save-cache: ${{ github.ref_name == 'main' }}

      - name: Install pnpm (for compatibility check)
        uses: pnpm/setup@b1cac37306e39c21283b9dd6cb0ac288fb35ba6b
        with:
          install: false

      - name: Install Node.js via pnpm (for hooks tests)
        run: pnpm runtime set node 22 --global

      - name: Cache pnpm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: ci-pnpm-v11-${{ matrix.os }}
          path: |
            ${{ env.PNPM_HOME }}/store/v11
            ${{ env.HOME }}/.local/share/pnpm/store/v11
        timeout-minutes: 1
        continue-on-error: true

      - name: Install just
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just

      - name: Install dependencies
        run: just install

      - name: Install cargo-nextest
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-nextest

      - name: Test pacquet
        shell: bash
        run: |
          # removing env vars is a temporary workaround for unit tests in pacquet relying on external environment
          # this should be removed in the future
          unset PNPM_HOME
          unset XDG_DATA_HOME

          node .github/scripts/measure-command.mjs \
            --name tests.all \
            --output .bench/pacquet-tests-all.json \
            -- just test-pacquet

      - name: Test pnpr
        shell: bash
        run: |
          # removing env vars is a temporary workaround for unit tests in pacquet relying on external environment
          # this should be removed in the future
          unset PNPM_HOME
          unset XDG_DATA_HOME

          node .github/scripts/measure-command.mjs \
            --name tests.all \
            --output .bench/pnpr-tests-all.json \
            -- just test-pnpr

      - name: Stage Bencher test durations
        env:
          TESTBED_OS: ${{ matrix.os }}
        shell: bash
        run: |
          os="${TESTBED_OS%-latest}"
          artifact_dir=.bench/artifact/rust
          mkdir -p "$artifact_dir"
          cp .bench/pacquet-tests-all.json "$artifact_dir/pacquet-tests-all.json"
          cp .bench/pnpr-tests-all.json "$artifact_dir/pnpr-tests-all.json"

          cat > "$artifact_dir/metadata.json" <<EOF
          {
            "kind": "rust",
            "reports": [
              {
                "testbed": "pacquet.${os}",
                "file": "pacquet-tests-all.json"
              },
              {
                "testbed": "pnpr.${os}",
                "file": "pnpr-tests-all.json"
              }
            ]
          }
          EOF

      - name: Upload Bencher test duration artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-performance-rust-${{ matrix.os }}
          path: .bench/artifact/rust/
          if-no-files-found: error
          retention-days: 14

  clippy:
    name: Rust CI / Clippy
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    # Clippy lints the same source on every platform, so one OS is
    # enough — running the full `--all-targets` workspace lint across the
    # whole test matrix just triples the cost. Mirrors the single-OS doc,
    # format, and dylint jobs. (Platform-gated `#[cfg]` blocks are still
    # type-checked per-OS by the test job's build.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # `clippy --all-targets` over the whole workspace holds a full set
      # of debug artifacts in target/; drop the preinstalled toolchains
      # this job never uses (~25 GB) so the linker doesn't hit ENOSPC.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          clippy: true

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

  doc:
    name: Rust CI / Doc
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          docs: true

      - name: Doc
        env:
          RUSTDOCFLAGS: '-D warnings'
        run: cargo doc --no-deps --workspace --document-private-items

  typos:
    name: Rust CI / Spell Check
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          files: pacquet pnpr

  deny:
    name: Rust CI / Cargo Deny
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name != 'merge_group'
        id: filter
        with:
          filters: |
            src:
              - 'Cargo.lock'
              - 'deny.toml'

      - name: Install cargo-deny
        if: github.event_name == 'merge_group' || steps.filter.outputs.src == 'true'
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-deny

      - if: github.event_name == 'merge_group' || steps.filter.outputs.src == 'true'
        run: cargo deny check

  format:
    name: Rust CI / Format
    needs: changes
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: ./.github/actions/rustup
        with:
          fmt: true
          restore-cache: false

      - run: cargo fmt --all -- --check

      - name: Install Taplo CLI
        uses: ./.github/actions/binstall
        with:
          packages: taplo-cli@0.8.1

      - run: taplo format --check

  dylint:
    name: Rust CI / Dylint
    needs: changes
    if: ${{ always() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' || needs.changes.result != 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify change detection
        if: ${{ needs.changes.result != 'success' }}
        run: |
          echo "::error::Unable to determine whether Rust CI should run."
          exit 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Two caches with disjoint scopes:
      #
      #   1. Workspace cache — `~/.cargo`, `~/.dylint_drivers`, and the
      #      workspace `target/` directory minus `target/dylint`. Keyed
      #      loosely on `Cargo.lock` with a `rust-toolchain.toml`-only
      #      fallback so a lockfile-only change still benefits from a
      #      warm registry and a warm workspace build cache. The
      #      `!target/dylint` negation excludes the lint library from
      #      this snapshot so it cannot leak across `dylint.toml`
      #      changes.
      #
      #   2. Dylint-library cache — `target/dylint`, where cargo-dylint
      #      builds `libperfectionist.so`. Keyed strictly on
      #      `dylint.toml` with no looser restore-keys, so a hit
      #      guarantees the cached `.so` was built against the
      #      in-tree config. On a miss cargo-dylint rebuilds the
      #      library from scratch.
      #
      # Splitting the caches this way removes the need for a separate
      # "invalidate stale dylint artifacts" step: the workspace cache
      # never holds a `target/dylint` snapshot to invalidate, and the
      # dylint-library cache can never be restored from a mismatched
      # `dylint.toml`.
      - name: Cache workspace artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: |
            ~/.cargo
            ~/.dylint_drivers
            target
            !target/dylint
          key: ${{ github.job }}-workspace-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ github.job }}-workspace-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}
            ${{ github.job }}-workspace-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Cache dylint lint library
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        timeout-minutes: 2
        continue-on-error: true
        with:
          path: target/dylint
          key: ${{ github.job }}-dylint-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('dylint.toml') }}

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          # Disable Swatinem/rust-cache: it strips `target/` aggressively
          # before saving, which would wipe the `target/dylint`
          # `libperfectionist.so` we want to preserve. The `actions/cache`
          # steps above handle caching instead.
          restore-cache: false

      - name: Install cargo-dylint and dylint-link
        uses: ./.github/actions/binstall
        with:
          # Pin to 6.0.0 until trailofbits/dylint cuts a 6.0.2. The
          # 6.0.1 binstall artifacts (published 2026-05-26 17:51 UTC)
          # fail at driver bootstrap with `failed to read
          # /home/runner/work/dylint/dylint/driver/Cargo.toml`, the
          # path baked in by dylint's own CI checkout. Downstream
          # runners don't have that workspace so the step aborts.
          packages: cargo-dylint@6.0.0 dylint-link@6.0.0

      - name: Run dylint
        # `-D warnings` must come in via `RUSTFLAGS`, not as a trailing
        # `-- -D warnings` after `cargo dylint`'s `--`: `cargo dylint`
        # forwards args after `--` to `cargo check`, which would treat
        # `-D warnings` as a cargo argument and reject it. This mirrors
        # how KSXGitHub/parallel-disk-usage invokes the same lint.
        env:
          RUSTFLAGS: '-D warnings'
        run: cargo dylint --all -- --all-targets --workspace

  # Single aggregate gate — the only Rust CI context branch protection
  # needs to require. Listing the individual jobs as required checks does
  # not work: most of them skip on non-Rust PRs, and a matrix job skipped
  # at the job level never expands its `${{ matrix.* }}` name, so the
  # per-OS contexts it would report never appear and the PR blocks forever
  # waiting for them. This job always runs (it reports under a static name
  # in every state) and fails only if a dependency actually failed or was
  # cancelled — skipped dependencies count as a pass.
  success:
    name: Rust CI / Success
    if: ${{ always() }}
    needs:
      - changes
      - test
      - clippy
      - doc
      - typos
      - deny
      - format
      - dylint
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
