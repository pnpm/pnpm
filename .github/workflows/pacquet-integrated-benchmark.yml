name: Pacquet Integrated-Benchmark

on:
  workflow_dispatch:
  push:
    # Update Bencher's baselines whenever something that could move
    # install perf lands on main. This one benchmark drives two testbeds:
    # `pacquet` (the direct install) and `pnpr` (the same client through
    # the pnpr install accelerator). The pnpr server is built from the
    # `pacquet-*` resolver/store/tarball crates, so a pacquet change can
    # move both — hence one shared trigger surface (`pacquet/**` + the
    # workspace infra) plus `pnpr/**` for the server itself. Paths mirror
    # the pull_request filter below.
    branches: [main]
    paths:
      - 'pacquet/**/*.rs'
      - 'pacquet/**/Cargo.toml'
      - 'pnpr/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'justfile'
      - 'pacquet/tasks/registry-mock/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'pacquet/tasks/integrated-benchmark/src/fixtures/**'
      - '.github/actions/rustup/**'
      - '.github/actions/binstall/**'
      - '.github/workflows/pacquet-integrated-benchmark.yml'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pacquet/**/*.rs'
      - 'pacquet/**/Cargo.toml'
      - 'pnpr/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'justfile'
      - 'pacquet/tasks/registry-mock/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'pacquet/tasks/integrated-benchmark/src/fixtures/**'
      - '.github/actions/rustup/**'
      - '.github/actions/binstall/**'
      - '.github/workflows/pacquet-integrated-benchmark.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# This workflow runs in the PR's privilege context, which is read-only for
# fork PRs (GitHub Actions security policy). The result is uploaded as an
# artifact and posted by `integrated-benchmark-comment.yml`, which runs in
# the base-repo privilege context via `workflow_run`.
permissions:
  contents: read
  checks: write

jobs:
  benchmark:
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest] # windows is skipped because of complexity, macos is skipped because of inconsistency
    name: Run benchmark on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # On main, HEAD *is* main — comparing them is wasted work, so the
      # benchmark runs a single revision per tool and uploads it to
      # Bencher as the new baseline. On every other ref (PRs and
      # workflow_dispatch from a non-main branch), compare HEAD against
      # main so the report shows the relative shift.
      #
      # Every scenario runs both tools: `pacquet@<rev>` (direct install)
      # and `pnpr@<rev>` (the same client through the pnpr install
      # accelerator, against a warm long-running server). The cold-store
      # scenarios wipe the *client* store between iterations while the
      # server stays warm — i.e. pnpr's cold-client-vs-warm-server shape,
      # the realistic CI case. Running both tools in one hyperfine
      # invocation also yields the pnpr-vs-direct ratio per scenario.
      BENCHMARK_TARGETS: ${{ github.ref_name == 'main' && 'pacquet@HEAD pnpr@HEAD' || 'pacquet@HEAD pacquet@main pnpr@HEAD pnpr@main' }}
      # Network emulation so both install strategies cross the link they
      # would in production instead of free loopback (~GB/s, ~0 RTT), which
      # would hide every download cost.
      #
      # `PNPR_LATENCY_MS` is the round-trip latency between the client and
      # each `pnpr@<rev>` server. `REGISTRY_LATENCY_MS` +
      # `REGISTRY_BANDWIDTH_MBPS` define the link to the registry, applied
      # to *every* client that touches it — direct `pacquet@<rev>` /
      # `pnpm` installs, the pnpr server's resolution, and the pnpr
      # client's tarball fetches alike — because a request to the
      # registry-mock should cost the same regardless of who makes it.
      # pnpr's win then comes from fewer client round trips (one
      # `PNPR_LATENCY_MS` hop to the server), not a faster registry link;
      # set `PNPR_LATENCY_MS == REGISTRY_LATENCY_MS` to keep the
      # pnpr-vs-direct ratio fair. Bandwidth is per-connection; latency
      # dominates small packages, bandwidth dominates large ones. The
      # ~200 Mbit/s default matches the public npm registry's measured
      # ~190 Mbit/s (~24 MB/s) peak; lower either value if the cold-store
      # scenarios' refetch waterfall strains the per-step timeouts.
      PNPR_LATENCY_MS: 50
      REGISTRY_LATENCY_MS: 50
      REGISTRY_BANDWIDTH_MBPS: 200
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Make main branch visible
        shell: bash
        run: |
          subsection() {
            echo >&2
            echo -e "\033[0;33m$*\033[0m" >&2
          }

          subsection 'Configuring git...'
          git config --global advice.detachedHead false

          subsection 'Checking out main branch...'
          git checkout main
          git log --oneline -n 3

          subsection 'Switching back...'
          git checkout -
          git log --oneline -n 3

          subsection 'Inspecting branches...'
          git branch

      - name: Resolve benchmark revisions
        id: revs
        shell: bash
        # The benchmark binaries are cached per *resolved commit* below, so
        # `main` is reused across PRs (its SHA is stable until main moves)
        # and a same-HEAD re-run reuses HEAD too — instead of recompiling
        # every revision on every run. Needs the local `main` ref that the
        # previous step made visible.
        run: |
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "main_sha=$(git rev-parse main)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm-registry storage
        # Persists pnpm-registry's `--storage` dir across CI runs so
        # cold-cache benchmark scenarios don't refetch ~2.3k unscoped
        # packages from npmjs on every run. Replaces the older
        # `~/.local/share/verdaccio/storage` cache from when the mock
        # was Node + Verdaccio. Path matches `runtime_storage()` in
        # `pacquet/tasks/registry-mock/src/dirs.rs` (defaults to
        # `$HOME/.cache/pnpm-registry/storage`).
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: integrated-benchmark-pnpm-registry-${{ hashFiles('pacquet/tasks/integrated-benchmark/src/fixtures/pnpm-lock.yaml') }}
          restore-keys: |
            integrated-benchmark-pnpm-registry-
          path: |
            ~/.cache/pnpm-registry/storage
        timeout-minutes: 1
        continue-on-error: true

      # Cargo download + the orchestrator's own build target. Deliberately
      # does NOT cache the multi-GB `bench-work-env/*/pacquet/target` dirs —
      # restoring those reliably blew the (former 1-minute) timeout, so the
      # cache silently missed and every run built cold. The compiled
      # revision *binaries* are cached separately, per commit, below.
      - name: Cache Rust deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: integrated-benchmark-deps-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ github.run_id }}
          restore-keys: |
            integrated-benchmark-deps-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-
            integrated-benchmark-deps-${{ matrix.os }}-
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
        timeout-minutes: 3
        continue-on-error: true

      # Prebuilt revision binaries, keyed on the resolved commit. A
      # `pnpr@<rev>` build also produces the `pacquet` client binary, and
      # the orchestrator's `--reuse-prebuilt-binaries` copies it to the
      # same-revision `pacquet@<rev>` target — so caching the two pnpr
      # binaries covers all four targets. `main` is a near-certain hit on
      # PRs (stable SHA), and a same-HEAD re-run hits HEAD too; a fresh HEAD
      # is the only thing that compiles. Restored into the paths the
      # orchestrator builds into, so it skips the clone + `cargo build`.
      - name: Cache pnpr@main binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: integrated-benchmark-bin-${{ matrix.os }}-${{ steps.revs.outputs.main_sha }}-${{ hashFiles('rust-toolchain.toml') }}
          path: |
            bench-work-env/pnpr@main/pacquet/target/release/pacquet
            bench-work-env/pnpr@main/pacquet/target/release/pnpr
        timeout-minutes: 2
        continue-on-error: true

      - name: Cache pnpr@HEAD binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: integrated-benchmark-bin-${{ matrix.os }}-${{ steps.revs.outputs.head_sha }}-${{ hashFiles('rust-toolchain.toml') }}
          path: |
            bench-work-env/pnpr@HEAD/pacquet/target/release/pacquet
            bench-work-env/pnpr@HEAD/pacquet/target/release/pnpr
        timeout-minutes: 2
        continue-on-error: true

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          shared-key: integrated-benchmark
          restore-cache: false # it's insufficient
          save-cache: false # it's insufficient

      - name: Install pnpm
        uses: pnpm/setup@b1cac37306e39c21283b9dd6cb0ac288fb35ba6b
        with:
          install: false

      - name: Cache pnpm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: integrated-benchmark-pnpm-v11-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            integrated-benchmark-pnpm-v11-
          path: |
            ${{ env.PNPM_HOME }}/store/v11
        timeout-minutes: 1
        continue-on-error: true

      - name: Install hyperfine
        uses: ./.github/actions/binstall
        with:
          packages: hyperfine@1.18.0

      - name: Install just
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: just

      - name: Install dependencies
        run: just install

      - name: Build the benchmark executor
        run: cargo build --bin=integrated-benchmark

      - name: Precompile benchmark revisions
        shell: bash
        # Builds the superset of targets (pacquet + pnpr revisions). A
        # `pnpr@<rev>` target builds both the `pacquet` client and the
        # `pnpr` server from its clone, so this also produces the server
        # binaries the boot step needs. More builds than the pacquet-only
        # bench, hence the larger timeout.
        timeout-minutes: 25
        run: just integrated-benchmark --reuse-prebuilt-binaries --build-only $BENCHMARK_TARGETS

      - name: 'Benchmark: Isolated linker: fresh restore, cold cache + cold store'
        shell: bash
        # Hyperfine has no per-command timeout, so a single hanging
        # install takes the whole step down with the GHA default job
        # timeout (6 h). 15 min is generous headroom for the warmup +
        # timed runs across all four commands (cold client store, so each
        # iteration re-fetches — pacquet from the registry, pnpr from its
        # warm server), and a failure surfaces fast enough to iterate on.
        timeout-minutes: 15
        run: |
          just integrated-benchmark --reuse-prebuilt-binaries --scenario=isolated-linker.fresh-restore.cold-cache.cold-store --registry=verdaccio --pnpr-latency-ms=${PNPR_LATENCY_MS} --registry-latency-ms=${REGISTRY_LATENCY_MS} --registry-bandwidth-mbps=${REGISTRY_BANDWIDTH_MBPS} $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE.json

      - name: 'Benchmark: Isolated linker: fresh restore, hot cache + hot store'
        shell: bash
        # Same timeout rationale as the cold-cache step above. Each
        # timed run wipes only `node_modules`; the per-revision client
        # store survives, and hyperfine's warmup populates it on the first
        # iteration so timed runs all see a hot client store (and a warm
        # server, as in every scenario).
        timeout-minutes: 15
        run: |
          just integrated-benchmark --reuse-prebuilt-binaries --scenario=isolated-linker.fresh-restore.hot-cache.hot-store --registry=verdaccio --pnpr-latency-ms=${PNPR_LATENCY_MS} --registry-latency-ms=${REGISTRY_LATENCY_MS} --registry-bandwidth-mbps=${REGISTRY_BANDWIDTH_MBPS} $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.json

      - name: 'Benchmark: Isolated linker: fresh install, cold cache + cold store'
        shell: bash
        # No-lockfile scenario: a fresh resolution runs longer than the
        # restore steps (pacquet resolves against the registry,
        # pnpm/pnpm#11832; pnpr offloads it to its server). 35 min leaves
        # headroom for the default hyperfine 1 warmup + 10 timed runs
        # across all four commands without losing the per-command timeout
        # safety net the other steps document.
        timeout-minutes: 35
        run: |
          just integrated-benchmark --reuse-prebuilt-binaries --scenario=isolated-linker.fresh-install.cold-cache.cold-store --registry=verdaccio --pnpr-latency-ms=${PNPR_LATENCY_MS} --registry-latency-ms=${REGISTRY_LATENCY_MS} --registry-bandwidth-mbps=${REGISTRY_BANDWIDTH_MBPS} $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE.json

      - name: 'Benchmark: Isolated linker: fresh install, hot cache + hot store'
        shell: bash
        # Same timeout rationale as the cold-cache install step above; the
        # hot client store makes each iteration cheaper, so 25 min is
        # ample headroom across all four commands.
        timeout-minutes: 25
        run: |
          just integrated-benchmark --reuse-prebuilt-binaries --scenario=isolated-linker.fresh-install.hot-cache.hot-store --registry=verdaccio --pnpr-latency-ms=${PNPR_LATENCY_MS} --registry-latency-ms=${REGISTRY_LATENCY_MS} --registry-bandwidth-mbps=${REGISTRY_BANDWIDTH_MBPS} $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.json

      - name: 'Benchmark: Isolated linker: fresh install, cold cache + hot store'
        shell: bash
        # Isolates resolution: a cold packument cache forces a full
        # re-resolve (a fetch waterfall over the registry link), but the hot
        # store means no tarball download dominates and hides it. This is
        # the scenario that exposes pnpr's resolution-offload win — a direct
        # install pays the cold resolution while pnpr offloads it to its warm
        # server. Cheap per iteration (no download), so 25 min is ample.
        timeout-minutes: 25
        run: |
          just integrated-benchmark --reuse-prebuilt-binaries --scenario=isolated-linker.fresh-install.cold-cache.hot-store --registry=verdaccio --pnpr-latency-ms=${PNPR_LATENCY_MS} --registry-latency-ms=${REGISTRY_LATENCY_MS} --registry-bandwidth-mbps=${REGISTRY_BANDWIDTH_MBPS} $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE.json

      - name: Generate summary
        shell: bash
        env:
          # The PR head SHA for pull_request events, otherwise (push,
          # workflow_dispatch) the ref's own SHA. Display-only — no
          # control flow consumes it; the comment workflow resolves the
          # PR number from the trusted workflow_run payload regardless.
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          (
            echo '## Integrated-Benchmark Report (${{ runner.os }})'
            echo
            echo "**Commit:** [\`${SHA:0:12}\`](${{ github.server_url }}/${{ github.repository }}/commit/$SHA)"
            echo
            echo 'Each scenario reports direct installs and pnpr installs. Bencher consumes pacquet@HEAD and pnpr@HEAD.'
            echo
            echo '### Scenario: Isolated linker: fresh restore, cold cache + cold store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE.json
            echo '```'
            echo
            echo '</details>'
            echo
            echo '### Scenario: Isolated linker: fresh restore, hot cache + hot store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.json
            echo '```'
            echo
            echo '</details>'
            echo
            echo '### Scenario: Isolated linker: fresh install, cold cache + cold store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE.json
            echo '```'
            echo
            echo '</details>'
            echo
            echo '### Scenario: Isolated linker: fresh install, hot cache + hot store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.json
            echo '```'
            echo
            echo '</details>'
            echo
            echo '### Scenario: Isolated linker: fresh install, cold cache + hot store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE.json
            echo '```'
            echo
            echo '</details>'
          ) > bench-work-env/SUMMARY.md

      - name: Build Bencher-shaped report
        # Combine the scenario JSONs into hyperfine-shaped files that
        # Bencher's shell_hyperfine adapter accepts, one per testbed. For
        # each, keep only the chosen target's result from each scenario
        # and rename `.command` to the scenario name, so Bencher names the
        # benchmark after the scenario. Both tools run all five scenarios,
        # so the `pacquet` testbed gets `pacquet@HEAD` and the `pnpr`
        # testbed gets `pnpr@HEAD`, each across the same scenario set.
        shell: bash
        run: |
          # Build one bencher-results file: $1 = output path, $2 = the
          # hyperfine command name to keep, $3.. = `FILE_TAG:scenario-name`
          # entries.
          build_bencher_file() {
            local out=$1 command=$2
            shift 2
            local inputs=()
            local entry file_tag name src dst
            for entry in "$@"; do
              file_tag="${entry%%:*}"
              name="${entry#*:}"
              src="bench-work-env/BENCHMARK_REPORT_${file_tag}.json"
              dst="bench-work-env/${name}-${command}-bencher.json"
              jq --arg s "$name" --arg c "$command" \
                '.results |= [.[] | select(.command == $c) | .command = $s]' \
                "$src" > "$dst"
              inputs+=("$dst")
            done
            jq -s '{results: map(.results) | add}' "${inputs[@]}" > "$out"
          }

          build_bencher_file bench-work-env/bencher-results.json pacquet@HEAD \
            'ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE:isolated-linker.fresh-restore.cold-cache.cold-store' \
            'ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE:isolated-linker.fresh-restore.hot-cache.hot-store' \
            'ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE:isolated-linker.fresh-install.cold-cache.cold-store' \
            'ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE:isolated-linker.fresh-install.hot-cache.hot-store' \
            'ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE:isolated-linker.fresh-install.cold-cache.hot-store'

          build_bencher_file bench-work-env/bencher-results-pnpr.json pnpr@HEAD \
            'ISOLATED_FRESH_RESTORE_COLD_CACHE_COLD_STORE:isolated-linker.fresh-restore.cold-cache.cold-store' \
            'ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE:isolated-linker.fresh-restore.hot-cache.hot-store' \
            'ISOLATED_FRESH_INSTALL_COLD_CACHE_COLD_STORE:isolated-linker.fresh-install.cold-cache.cold-store' \
            'ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE:isolated-linker.fresh-install.hot-cache.hot-store' \
            'ISOLATED_FRESH_INSTALL_COLD_CACHE_HOT_STORE:isolated-linker.fresh-install.cold-cache.hot-store'

      - name: Stage artifact contents
        # The artifact carries the rendered report plus the
        # Bencher-shaped JSON consumed by the comment-posting
        # workflow. The PR number and runner OS are derived from the
        # trusted workflow_run event payload in that workflow, not
        # from fork-controlled artifact contents.
        shell: bash
        run: |
          mkdir -p benchmark-artifact
          cp bench-work-env/SUMMARY.md benchmark-artifact/SUMMARY.md
          cp bench-work-env/bencher-results.json benchmark-artifact/bencher-results.json
          cp bench-work-env/bencher-results-pnpr.json benchmark-artifact/bencher-results-pnpr.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integrated-benchmark-report-${{ matrix.os }}
          path: benchmark-artifact/
          if-no-files-found: error
          retention-days: 14

      - name: Install Bencher CLI
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: bencherdev/bencher@50fb1e138651a46d2fb704fab1adab38c181552e # v0.6.6

      - name: Upload results to Bencher
        # Runs on push and workflow_dispatch — both execute in the
        # base-repo privilege context where secrets are available.
        # PR runs (including from forks) skip this step and upload
        # via the workflow_run comment workflow instead.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "${BENCHER_API_TOKEN:-}" ]; then
            echo "::notice::BENCHER_API_TOKEN not set, skipping Bencher upload"
            exit 0
          fi
          # One run is one benchmark, two testbeds: `pacquet` (direct
          # install, all scenarios) and `pnpr` (accelerated path, hot
          # scenarios). Upload each from its own bencher-results file.
          # `--start-point-clone-thresholds` so the forked branch inherits
          # the threshold configured on main; `--err` so the workflow fails
          # when a sample breaches the upper boundary. Main pushes skip
          # both — by then the regression has already landed.
          upload() {
            local testbed=$1 file=$2
            if [ ! -f "$file" ]; then
              echo "::notice::$file not found, skipping $testbed upload"
              return 0
            fi
            local args=(
              --project pnpm
              --testbed "$testbed"
              --adapter shell_hyperfine
              --file "$file"
              --github-actions "$GITHUB_TOKEN"
            )
            if [ "$REF_NAME" = "main" ]; then
              args+=(--branch main)
            else
              args+=(
                --branch "$REF_NAME"
                --start-point main
                --start-point-reset
                --start-point-clone-thresholds
                --err
              )
            fi
            bencher run "${args[@]}"
          }
          upload pacquet bench-work-env/bencher-results.json
          upload pnpr bench-work-env/bencher-results-pnpr.json
