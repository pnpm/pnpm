name: Release @pnpm/pnpr

# Manual-trigger only. Type the version to publish — the workflow patches
# pnpr/npm/pnpr/package.json with it before generating per-platform
# packages and publishing. It then builds and pushes a multi-arch Docker
# image (ghcr.io/pnpm/pnpr) from the same static musl binaries. No git tag
# is created and no GitHub release asset is uploaded; npm and GHCR are the
# authoritative artifact stores.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.3 or 0.2.3-rc.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      id-token: write # needed for actions/attest-build-provenance
      attestations: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            code-target: linux-x64-musl

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            code-target: linux-arm64-musl

          - os: macos-latest
            target: x86_64-apple-darwin
            code-target: darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install cross
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cross

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Validate version input
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pnpr/crates/pnpr/Cargo.toml
        # `pnpr --version` reads CARGO_PKG_VERSION via clap's
        # derive `version` attribute. Patch the crate's `version = "..."`
        # field so the binary built for the matrix leg reports the
        # version we're about to publish.
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          file=pnpr/crates/pnpr/Cargo.toml
          perl -i -pe 's/^(version\s*=\s*)"[^"]*"/$1"$ENV{VERSION}"/' "$file"
          grep -E '^version\s*=\s*"'"$VERSION"'"' "$file"

      - name: Build with cross
        run: cross build -p pnpr --bin pnpr --release --target=${{ matrix.target }}

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      # Rename the binary to include the target triple so the archive
      # that generate-packages.mjs picks up is already named
      # `pnpr-<target>`.
      - name: Archive Binary
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN_NAME=pnpr-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pnpr.exe $BIN_NAME.exe
          7z a $BIN_NAME.zip $BIN_NAME.exe

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      - name: Archive Binary
        if: runner.os != 'Windows'
        run: |
          BIN_NAME=pnpr-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pnpr $BIN_NAME
          tar czf $BIN_NAME.tar.gz $BIN_NAME
          # Pin the binary's checksum at build time so the Docker job can
          # verify the artifact it stages into the image context.
          shasum -a 256 $BIN_NAME > $BIN_NAME.sha256

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            pnpr-${{ matrix.code-target }}*

      - name: Upload Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: binaries-${{ matrix.code-target }}
          path: |
            *.zip
            *.tar.gz
            *.sha256

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      # Required for npm provenance attestations via OIDC.
      id-token: write
    needs:
      - build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pnpr/npm/pnpr/package.json
        # The committed package.json has no `version` field; the version comes
        # from the workflow_dispatch input. Patching it here means
        # generate-packages.mjs (which copies the version into each
        # per-platform manifest) and `pnpm publish` (which reads from
        # package.json) both see the right value.
        env:
          VERSION: ${{ inputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' pnpr/npm/pnpr/package.json > pnpr/npm/pnpr/package.json.tmp
          mv pnpr/npm/pnpr/package.json.tmp pnpr/npm/pnpr/package.json
          cat pnpr/npm/pnpr/package.json

      - name: Install pnpm and Node
        uses: pnpm/setup@b1cac37306e39c21283b9dd6cb0ac288fb35ba6b
        with:
          runtime: node@22
          install: false

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Unzip
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: unzip -qq *.zip -d .

      - name: Extract tarballs
        run: ls *.gz | xargs -i tar xf {}

      - name: Generate npm packages
        run: |
          node pnpr/npm/pnpr/scripts/generate-packages.mjs
          cat pnpr/npm/pnpr/package.json
          for package in pnpr/npm/pnpr*; do cat $package/package.json ; echo ; done

      - name: Publish npm packages as latest
        # Auth is via npm's trusted publishing: `id-token: write` above grants
        # this job an OIDC token that pnpm/npm exchange with the registry,
        # so no NPM_TOKEN is needed. `--provenance` attaches the same OIDC
        # token to a provenance attestation on each tarball.
        # The trailing slash on $package/ changes it to publishing the directory.
        run: |
          for package in pnpr/npm/pnpr*; do
            pnpm publish "$package/" --tag latest --access public --provenance --no-git-checks
          done

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - build
      - publish
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/pnpr
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compute image tags
        id: tags
        # A version containing a hyphen (e.g. 0.2.3-rc.1) is a prerelease and
        # must not move the mutable `latest` tag.
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi
          tags="${IMAGE}:${VERSION}"
          case "$VERSION" in
            *-*) ;;
            *) tags="${tags},${IMAGE}:latest" ;;
          esac
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Download Linux musl binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-linux-*-musl
          merge-multiple: true

      - name: Stage binaries for the build context
        id: stage
        # The static musl binaries match what was just published to npm. The
        # Dockerfile selects one via the build's TARGETARCH (amd64 / arm64) and
        # re-verifies it against the build-time checksum surfaced here.
        #
        # Extract into a throwaway directory and move only the expected,
        # checksum-verified regular files into the build context, so a malformed
        # archive cannot escape it (path traversal, symlinks) and overwrite the
        # Dockerfile or the staged binaries before they are pushed to GHCR.
        run: |
          set -eu
          rm -rf extracted
          mkdir extracted
          for f in pnpr-linux-*-musl.tar.gz; do
            tar -xzf "$f" -C extracted --no-same-owner
          done
          ( cd extracted && sha256sum -c ../pnpr-linux-x64-musl.sha256 ../pnpr-linux-arm64-musl.sha256 )
          for pair in x64:amd64 arm64:arm64; do
            bin="extracted/pnpr-linux-${pair%:*}-musl"
            test -f "$bin" && test ! -L "$bin"
            mv "$bin" "pnpr/docker/pnpr-${pair#*:}"
          done
          {
            echo "sha_amd64=$(awk '{print $1}' pnpr-linux-x64-musl.sha256)"
            echo "sha_arm64=$(awk '{print $1}' pnpr-linux-arm64-musl.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./pnpr/docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PNPR_VERSION=${{ inputs.version }}
            PNPR_SHA256_AMD64=${{ steps.stage.outputs.sha_amd64 }}
            PNPR_SHA256_ARM64=${{ steps.stage.outputs.sha_arm64 }}
          provenance: mode=max
          sbom: true
