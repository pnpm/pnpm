# Run cargo-llvm-cov and upload to codecov.io

name: Pacquet Code Coverage

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pacquet/**/*.rs'
      - 'pnpr/**/*.rs'
  push:
    branches:
      - main
    paths:
      - 'pacquet/**/*.rs'
      - 'pnpr/**/*.rs'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true # Pull submodules for `cargo coverage`
          persist-credentials: false

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: cargo-nextest

      - name: Install llvm-tools-preview for llvm-cov
        run: rustup component add llvm-tools-preview

      - name: Install pnpm (for compatibility check)
        uses: pnpm/setup@77cf06832101b3ac8c65caaf76a21643936d07a4
        with:
          install: false

      - name: Cache pnpm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: codecov-pnpm-v11-${{ runner.os }}
          path: |
            ${{ env.PNPM_HOME }}/store/v11
            ${{ env.HOME }}/.local/share/pnpm/store/v11
        timeout-minutes: 1
        continue-on-error: true

      - name: Install just
        uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just

      - name: Install dependencies
        run: just install

      - name: Run
        run: |
          # removing env vars is a temporary workaround for unit tests in pacquet relying on external environment
          # this should be removed in the future
          unset PNPM_HOME
          unset XDG_DATA_HOME

          cargo codecov --lcov --output-path lcov.info

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codecov
          path: lcov.info

  # codecov often fails, use another workflow for retry
  upload-codecov:
    name: Upload coverage file
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codecov

      - name: Upload to codecov.io
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: lcov.info
