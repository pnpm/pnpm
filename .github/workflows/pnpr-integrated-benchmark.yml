name: Pnpr Integrated-Benchmark

on:
  workflow_dispatch:
  push:
    # Update Bencher's baseline for the `pnpr` testbed whenever something
    # that could move the pnpr-accelerated install path lands on main.
    # That path spans the pnpr server (`pnpr/**`), the client that drives
    # it (`pacquet/crates/pnpr-client/**`), and the config plumbing that
    # turns it on (`pacquet/crates/config/**`, which owns `pnprServer`).
    # Paths mirror the pull_request filter below.
    branches: [main]
    paths:
      - 'pnpr/**'
      - 'pacquet/crates/pnpr-client/**'
      - 'pacquet/crates/config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'justfile'
      - 'pacquet/tasks/registry-mock/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'pacquet/tasks/integrated-benchmark/src/**'
      - '.github/actions/rustup/**'
      - '.github/actions/binstall/**'
      - '.github/workflows/pnpr-integrated-benchmark.yml'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pnpr/**'
      - 'pacquet/crates/pnpr-client/**'
      - 'pacquet/crates/config/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'justfile'
      - 'pacquet/tasks/registry-mock/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'pacquet/tasks/integrated-benchmark/src/**'
      - '.github/actions/rustup/**'
      - '.github/actions/binstall/**'
      - '.github/workflows/pnpr-integrated-benchmark.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# This workflow runs in the PR's privilege context, which is read-only for
# fork PRs (GitHub Actions security policy). The result is uploaded as an
# artifact and posted by `pnpr-integrated-benchmark-comment.yml`, which runs
# in the base-repo privilege context via `workflow_run`.
permissions:
  contents: read
  checks: write

jobs:
  benchmark:
    strategy:
      max-parallel: 1
      matrix:
        os: [ubuntu-latest] # windows is skipped because of complexity, macos is skipped because of inconsistency
    name: Run benchmark on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # The `pnpr@HEAD` target measures the pnpr-accelerated install path;
      # the `pacquet@HEAD` target is the same client without pnpr (direct
      # to the registry), so the report's two cells give the pnpr-vs-direct
      # ratio in one run. On main, HEAD *is* main — comparing pnpr@HEAD to
      # pnpr@main is wasted work, so only the pnpr@HEAD baseline (plus the
      # direct reference) runs and uploads to Bencher. On every other ref
      # (PRs, dispatch from a non-main branch), add `pnpr@main` so the
      # report also shows the regression delta against main.
      BENCHMARK_TARGETS: ${{ github.ref_name == 'main' && 'pnpr@HEAD pacquet@HEAD' || 'pnpr@HEAD pnpr@main pacquet@HEAD' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Make main branch visible
        shell: bash
        run: |
          subsection() {
            echo >&2
            echo -e "\033[0;33m$*\033[0m" >&2
          }

          subsection 'Configuring git...'
          git config --global advice.detachedHead false

          subsection 'Checking out main branch...'
          git checkout main
          git log --oneline -n 3

          subsection 'Switching back...'
          git checkout -
          git log --oneline -n 3

          subsection 'Inspecting branches...'
          git branch

      - name: Cache pnpm-registry storage
        # Persists pnpm-registry's `--storage` dir across CI runs so the
        # registry-mock (a pnpr proxy of npmjs) doesn't refetch ~2.3k
        # unscoped packages on every run. Path matches `runtime_storage()`
        # in `pacquet/tasks/registry-mock/src/dirs.rs`. The per-target
        # pnpr *accelerator* server uses its own isolated `pnpr-storage`
        # under the work-env and is intentionally not cached.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: pnpr-integrated-benchmark-pnpm-registry-${{ hashFiles('pacquet/tasks/integrated-benchmark/src/fixtures/pnpm-lock.yaml') }}
          restore-keys: |
            pnpr-integrated-benchmark-pnpm-registry-
          path: |
            ~/.cache/pnpm-registry/storage
        timeout-minutes: 1
        continue-on-error: true

      - name: Cache Rust builds
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: pnpr-integrated-benchmark-builds-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-${{ github.run_id }}
          restore-keys: |
            pnpr-integrated-benchmark-builds-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}-
            pnpr-integrated-benchmark-builds-${{ matrix.os }}-
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            bench-work-env/*/pacquet/target
        timeout-minutes: 1
        continue-on-error: true

      - name: Install Rust Toolchain
        uses: ./.github/actions/rustup
        with:
          shared-key: pnpr-integrated-benchmark
          restore-cache: false # it's insufficient
          save-cache: false # it's insufficient

      - name: Install pnpm
        uses: pnpm/setup@b1cac37306e39c21283b9dd6cb0ac288fb35ba6b
        with:
          install: false

      - name: Cache pnpm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: pnpr-integrated-benchmark-pnpm-v11-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpr-integrated-benchmark-pnpm-v11-
          path: |
            ${{ env.PNPM_HOME }}/store/v11
        timeout-minutes: 1
        continue-on-error: true

      - name: Install hyperfine
        uses: ./.github/actions/binstall
        with:
          packages: hyperfine@1.18.0

      - name: Install just
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2.78.1
        with:
          tool: just

      - name: Install dependencies
        run: just install

      - name: Build the benchmark executor
        run: cargo build --bin=integrated-benchmark

      - name: Precompile benchmark revisions
        shell: bash
        # A `pnpr@<rev>` target builds both the `pacquet` client and the
        # `pnpr` server from the revision's monorepo clone, so this also
        # produces the server binaries the boot step needs at run time.
        timeout-minutes: 20
        run: just integrated-benchmark --build-only $BENCHMARK_TARGETS

      - name: 'Benchmark: Isolated linker: fresh restore, hot cache + hot store'
        shell: bash
        # Hyperfine has no per-command timeout, so a single hanging
        # install takes the whole step down with the GHA default job
        # timeout (6 h). 15 min is generous headroom for the warmup +
        # timed runs across all targets, and a failure surfaces fast.
        timeout-minutes: 15
        run: |
          just integrated-benchmark --scenario=isolated-linker.fresh-restore.hot-cache.hot-store --registry=verdaccio $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.json

      - name: 'Benchmark: Isolated linker: fresh install, hot cache + hot store'
        shell: bash
        # No-lockfile scenario: the pnpr server resolves from scratch on
        # the first request, so a single iteration runs longer than the
        # restore step. 20 min leaves headroom for the warmup + timed runs
        # across all targets.
        timeout-minutes: 20
        run: |
          just integrated-benchmark --scenario=isolated-linker.fresh-install.hot-cache.hot-store --registry=verdaccio $BENCHMARK_TARGETS
          cp bench-work-env/BENCHMARK_REPORT.md bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.md
          cp bench-work-env/BENCHMARK_REPORT.json bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.json

      - name: Generate summary
        shell: bash
        run: |
          (
            echo '## Pnpr Integrated-Benchmark Report (${{ runner.os }})'
            echo
            echo 'The `pnpr@HEAD` row is the pnpr-accelerated install; `pacquet@HEAD` is the same client going direct to the registry (no pnpr).'
            echo
            echo '### Scenario: Isolated linker: fresh restore, hot cache + hot store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE.json
            echo '```'
            echo
            echo '</details>'
            echo
            echo '### Scenario: Isolated linker: fresh install, hot cache + hot store'
            echo
            cat bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.md
            echo
            echo '<details><summary>BENCHMARK_REPORT.json</summary>'
            echo
            echo '```json'
            jq 'del(.results[].exit_codes)' bench-work-env/BENCHMARK_REPORT_ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE.json
            echo '```'
            echo
            echo '</details>'
          ) > bench-work-env/SUMMARY.md

      - name: Build Bencher-shaped report
        # Combine the scenario JSONs into one hyperfine-shaped file that
        # Bencher's shell_hyperfine adapter accepts. We keep only the
        # @pnpr@HEAD result from each scenario and rename `.command` to the
        # scenario name, so Bencher names the benchmark after the scenario
        # and the `pnpr` testbed tracks the accelerated path over time. The
        # direct `pacquet@HEAD` reference stays in the PR summary only.
        shell: bash
        run: |
          scenarios=(
            'ISOLATED_FRESH_RESTORE_HOT_CACHE_HOT_STORE:isolated-linker.fresh-restore.hot-cache.hot-store'
            'ISOLATED_FRESH_INSTALL_HOT_CACHE_HOT_STORE:isolated-linker.fresh-install.hot-cache.hot-store'
          )
          inputs=()
          for entry in "${scenarios[@]}"; do
            file_tag="${entry%%:*}"
            name="${entry#*:}"
            src="bench-work-env/BENCHMARK_REPORT_${file_tag}.json"
            dst="bench-work-env/${name}-bencher.json"
            jq --arg s "$name" \
              '.results |= [.[] | select(.command == "pnpr@HEAD") | .command = $s]' \
              "$src" > "$dst"
            inputs+=("$dst")
          done
          jq -s '{results: map(.results) | add}' \
            "${inputs[@]}" > bench-work-env/bencher-results.json

      - name: Stage artifact contents
        # The artifact carries the rendered report plus the Bencher-shaped
        # JSON consumed by the comment-posting workflow. The PR number and
        # runner OS are derived from the trusted workflow_run event payload
        # in that workflow, not from fork-controlled artifact contents.
        shell: bash
        run: |
          mkdir -p benchmark-artifact
          cp bench-work-env/SUMMARY.md benchmark-artifact/SUMMARY.md
          cp bench-work-env/bencher-results.json benchmark-artifact/bencher-results.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpr-integrated-benchmark-report-${{ matrix.os }}
          path: benchmark-artifact/
          if-no-files-found: error
          retention-days: 14

      - name: Install Bencher CLI
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: bencherdev/bencher@50fb1e138651a46d2fb704fab1adab38c181552e # v0.6.6

      - name: Upload results to Bencher
        # Runs on push and workflow_dispatch — both execute in the
        # base-repo privilege context where secrets are available. PR runs
        # (including from forks) skip this step and upload via the
        # workflow_run comment workflow instead.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -z "${BENCHER_API_TOKEN:-}" ]; then
            echo "::notice::BENCHER_API_TOKEN not set, skipping Bencher upload"
            exit 0
          fi
          args=(
            --project pnpm
            --testbed pnpr
            --adapter shell_hyperfine
            --file bench-work-env/bencher-results.json
            --github-actions "$GITHUB_TOKEN"
          )
          # `--start-point-clone-thresholds` so the forked branch inherits
          # the threshold configured on main; `--err` so the workflow fails
          # when a sample breaches the upper boundary. Main pushes skip
          # both — by then the regression has already landed.
          if [ "$REF_NAME" = "main" ]; then
            args+=(--branch main)
          else
            args+=(
              --branch "$REF_NAME"
              --start-point main
              --start-point-reset
              --start-point-clone-thresholds
              --err
            )
          fi
          bencher run "${args[@]}"
