name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    permissions:
      id-token: write  # Required for OIDC
      contents: write  # for softprops/action-gh-release to create GitHub release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install ldid
        run: |
          sudo apt-get update
          sudo apt-get install git build-essential libplist-dev libssl-dev openssl qemu-user-binfmt pkg-config
          cd /tmp
          git clone https://github.com/ProcursusTeam/ldid.git
          cd ldid
          git checkout c2f8abf013b22c335f44241a6a552a7767e73419
          git submodule update --init
          gcc -I. -c -o lookup2.o lookup2.c
          g++ -std=c++11 -o ldid lookup2.o ldid.cpp -I. -lcrypto $(pkg-config --cflags --libs libplist-2.0) -lxml2
          sudo mv ldid /usr/local/bin
      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          standalone: true
      # Pin Node to the latest version still compatible with `esm@3.2.25`,
      # which is pulled in transitively by `publish-packed` and crashes the
      # `pnpm/bundle.ts` step on the runner's default Node. See #11988 /
      # release 10.34.0 incident for context.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      - name: npm install
        run: pnpm install --global npm@11.6.2
      - name: pnpm install
        # We use --force because we want all artifacts of @reflink/reflink to be installed.
        run: pnpm install --force
      # Release gate: a stale embedded key set would make pnpm unable to verify
      # packages signed with npm's rotated key, so block the release until the
      # embedded keys are refreshed.
      - name: Check embedded npm signing keys are in sync with the npm registry
        run: pnpm run check:npm-signing-keys
      - name: Publish Packages
        env:
          # setting the "npm_config_//registry.npmjs.org/:_authToken" env variable directly doesn't work.
          # probably "pnpm release" doesn't pass auth tokens to child processes
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}" # pnpm config set is broken
          pnpm release
      - name: Copy Artifacts
        run: pnpm run copy-artifacts
      - name: Generate release description
        run: pnpm run make-release-description
      - name: Release
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          draft: true
          files: dist/*
          body_path: RELEASE.md
