name: Release pnpm (Rust)

# Manual-trigger only: patches the version into pacquet/npm/pnpm/package.json,
# generates the per-platform packages, and publishes (no git tag / release asset
# — npm is the artifact store). Ships the Rust port under two names, `pnpm` and
# `@pnpm/exe`, both depending on the `@pnpm/exe.<target>` natives. The `tag`
# defaults to `next-12` so a release never touches the production `latest`.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 12.0.0-alpha.0)'
        required: true
        type: string
      tag:
        # A `choice` (not free-form) so a mistaken `latest` can't move the
        # production `pnpm` dist-tag. `latest` is intentionally omitted.
        description: 'npm dist-tag to publish under'
        required: true
        default: 'next-12'
        type: choice
        options:
          - next-12
          - next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      id-token: write # needed for actions/attest-build-provenance
      attestations: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            code-target: linux-x64-musl

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            code-target: linux-arm64-musl

          - os: macos-latest
            target: x86_64-apple-darwin
            code-target: darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cross
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cross

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Validate version input
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pacquet/crates/config/src/defaults.rs
        # `pacquet --version` and the default User-Agent both read the
        # PACQUET_VERSION constant. Patch it here so the binary built for the
        # matrix leg reports the version we're about to publish.
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          file=pacquet/crates/config/src/defaults.rs
          perl -i -pe 's/(pub const PACQUET_VERSION: &str = )"[^"]*";/${1}"'"$VERSION"'";/' "$file"
          grep -F "PACQUET_VERSION: &str = \"$VERSION\"" "$file"

      - name: Build with cross
        run: cross build -p pacquet-cli --bin pacquet --release --target=${{ matrix.target }}

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      - name: Archive Binary
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN_NAME=pacquet-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pacquet.exe $BIN_NAME.exe
          7z a $BIN_NAME.zip $BIN_NAME.exe

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      - name: Archive Binary
        if: runner.os != 'Windows'
        run: |
          BIN_NAME=pacquet-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pacquet $BIN_NAME
          tar czf $BIN_NAME.tar.gz $BIN_NAME

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            pacquet-${{ matrix.code-target }}*

      - name: Upload Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: binaries-${{ matrix.code-target }}
          path: |
            *.zip
            *.tar.gz

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Required for npm provenance attestations via OIDC.
      id-token: write
    needs:
      - build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pacquet/npm/pnpm/package.json
        # The committed package.json has no `version`; patch it from the input so
        # generate-packages.mjs and `pnpm publish` both pick it up.
        env:
          VERSION: ${{ inputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' pacquet/npm/pnpm/package.json > pacquet/npm/pnpm/package.json.tmp
          mv pacquet/npm/pnpm/package.json.tmp pacquet/npm/pnpm/package.json
          cat pacquet/npm/pnpm/package.json

      - name: Install pnpm and Node
        uses: pnpm/setup@77cf06832101b3ac8c65caaf76a21643936d07a4
        with:
          runtime: node@22
          install: false

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Unzip
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: unzip -qq *.zip -d .

      - name: Extract tarballs
        run: ls *.gz | xargs -i tar xf {}

      - name: Generate npm packages
        run: |
          node pacquet/npm/pnpm/scripts/generate-packages.mjs
          cat pacquet/npm/pnpm/package.json
          for package in pacquet/npm/pacquet-* pacquet/npm/pnpm*; do cat $package/package.json ; echo ; done

      - name: Publish npm packages
        # Auth via npm trusted publishing (the `id-token: write` OIDC token), so
        # no NPM_TOKEN; `--provenance` attests each tarball. The trailing slash
        # publishes the directory. The glob covers the native sub-packages (build
        # dirs `pacquet-*`, published as `@pnpm/exe.<target>`) plus the `pnpm` and
        # `@pnpm/exe` (`pnpm-exe`) wrappers.
        env:
          TAG: ${{ inputs.tag }}
        run: |
          for package in pacquet/npm/pacquet-* pacquet/npm/pnpm*; do
            pnpm publish "$package/" --tag "$TAG" --access public --provenance --no-git-checks
          done
