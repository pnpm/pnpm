name: Release pnpm (Rust)

# Manual-trigger only: patches the npm wrapper versions, generates the
# per-platform packages, and publishes. Ships the Rust port under `pnpm`,
# `@pnpm/exe`, and `@pnpm/napi`. Native packages go live directly; wrappers are
# staged and must be approved with `pnpm stage approve` to go live. The `tag`
# defaults to `next-12` so a release never touches the production `latest`.
#
# Besides npm, the workflow drafts a GitHub release whose assets follow the
# same naming scheme as the v11 releases (`pnpm-<platform>-<arch>[-musl]`), so
# get.pnpm.io's install.sh / install.ps1 can install v12 once a maintainer
# publishes the draft.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 12.0.0-alpha.0)'
        required: true
        type: string
      tag:
        # A `choice` (not free-form) so a mistaken `latest` can't move the
        # production `pnpm` dist-tag. `latest` is intentionally omitted.
        description: 'npm dist-tag to publish under'
        required: true
        default: 'next-12'
        type: choice
        options:
          - next-12
          - next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      id-token: write # needed for actions/attest-build-provenance
      attestations: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            code-target: linux-x64-musl

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            code-target: linux-arm64-musl

          - os: macos-latest
            target: x86_64-apple-darwin
            code-target: darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cross
        uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: cross

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Validate version input
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pnpm/crates/config/src/defaults.rs
        # `pacquet --version` and the default User-Agent both read the
        # PACQUET_VERSION constant. Patch it here so the binary built for the
        # matrix leg reports the version we're about to publish.
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          file=pnpm/crates/config/src/defaults.rs
          perl -i -pe 's/(pub const PACQUET_VERSION: &str = )"[^"]*";/${1}"'"$VERSION"'";/' "$file"
          grep -F "PACQUET_VERSION: &str = \"$VERSION\"" "$file"

      - name: Build with cross
        run: cross build -p pacquet-cli --bin pacquet --release --target=${{ matrix.target }}

      - name: Build NAPI addon with cross
        # musl targets enable `crt-static` by default, but a `cdylib` (the
        # `.node` addon) can't be produced with a statically linked CRT. Disable
        # it so the addon builds as a shared object that dynamically links musl
        # libc at load time (this is what napi-rs does for musl prebuilds). The
        # CLI binary keeps `crt-static` — it's built in the separate step above,
        # so it stays fully static for portability across musl distros.
        #
        # Set RUSTFLAGS only for musl: an empty RUSTFLAGS is not a no-op — Cargo
        # treats it as an override that discards any `rustflags` from
        # `.cargo/config.toml`, so we leave it unset on every other target.
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [[ "$TARGET" == *musl* ]]; then
            export RUSTFLAGS="-C target-feature=-crt-static"
          fi
          cross build -p pacquet-napi --profile napi-release --target="$TARGET"

      - name: Prepare NAPI addon
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) source="target/${{ matrix.target }}/napi-release/pacquet_napi.dll" ;;
            macOS) source="target/${{ matrix.target }}/napi-release/libpacquet_napi.dylib" ;;
            *) source="target/${{ matrix.target }}/napi-release/libpacquet_napi.so" ;;
          esac
          cp "$source" "pnpm-napi.${{ matrix.code-target }}.node"

      # The binary is archived to fix permission loss
      # (https://github.com/actions/upload-artifact#permission-loss) and ships
      # under its final name: `pnpm-<target>` archives with a plain `pnpm`
      # binary at the root — the layout the v11 releases use and get.pnpm.io's
      # install scripts expect — so the github-release job can upload them to
      # the GitHub release byte-for-byte as attested here.
      - name: Archive Binary
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/pacquet.exe pnpm.exe
          7z a pnpm-${{ matrix.code-target }}.zip pnpm.exe

      - name: Archive Binary
        if: runner.os != 'Windows'
        run: |
          mv target/${{ matrix.target }}/release/pacquet pnpm
          tar czf pnpm-${{ matrix.code-target }}.tar.gz pnpm

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            pnpm-${{ matrix.code-target }}.*
            pnpm-napi.${{ matrix.code-target }}.node

      - name: Upload Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: binaries-${{ matrix.code-target }}
          path: |
            *.zip
            *.tar.gz
            *.node

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Required for npm provenance attestations via OIDC.
      id-token: write
    needs:
      - build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 0.2.3 or 0.2.3-rc.1)"
            exit 1
          fi

      - name: Inject version into pnpm/npm/pnpm/package.json
        # The committed package.json has no `version`; patch it from the input so
        # generate-packages.mjs and `pnpm publish` both pick it up.
        env:
          VERSION: ${{ inputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' pnpm/npm/pnpm/package.json > pnpm/npm/pnpm/package.json.tmp
          mv pnpm/npm/pnpm/package.json.tmp pnpm/npm/pnpm/package.json
          cat pnpm/npm/pnpm/package.json

      - name: Inject version into pnpm/npm/napi/package.json
        env:
          VERSION: ${{ inputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' pnpm/npm/napi/package.json > pnpm/npm/napi/package.json.tmp
          mv pnpm/npm/napi/package.json.tmp pnpm/npm/napi/package.json
          cat pnpm/npm/napi/package.json

      - name: Install pnpm and Node
        uses: pnpm/setup@77cf06832101b3ac8c65caaf76a21643936d07a4
        with:
          runtime: node@22
          install: false

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Extract archives
        # Every archive holds a binary named `pnpm` / `pnpm.exe` at its root
        # (see the Archive Binary steps), so extracting them all into the same
        # directory would clobber one target with another. Extract each into a
        # scratch dir and move the binary out under its target-qualified name,
        # which is what generate-packages.mjs reads.
        run: |
          for archive in pnpm-*.zip; do
            rm -rf extract && mkdir extract
            unzip -q "$archive" -d extract
            mv extract/pnpm.exe "${archive%.zip}.exe"
          done
          for archive in pnpm-*.tar.gz; do
            rm -rf extract && mkdir extract
            tar -xzf "$archive" -C extract
            mv extract/pnpm "${archive%.tar.gz}"
          done

      - name: Generate npm packages
        run: |
          node pnpm/npm/pnpm/scripts/generate-packages.mjs
          node pnpm/npm/napi/scripts/generate-packages.mjs
          cat pnpm/npm/pnpm/package.json
          cat pnpm/npm/napi/package.json
          for package in pnpm/npm/pacquet-* pnpm/npm/napi.* pnpm/npm/pnpm*; do cat $package/package.json ; echo ; done

      # The publish is split into two steps because npm allows a single trusted
      # publisher per package, and `pnpm` / `@pnpm/exe` have theirs bound to
      # release.yml (the v11 TS releases). The `@pnpm/exe.<target>` natives are
      # published only from this workflow, so they use trusted publishing and go
      # live immediately; the two wrappers are only *staged* with the static
      # token and go live when a maintainer runs `pnpm stage approve <stage-id>`
      # (that's where the OTP is consumed, so no proof-of-presence is needed
      # here). Publishing the natives first keeps the wrappers' exact-version
      # optionalDependencies installable at approval time. `--provenance` works
      # in both steps — it needs only the `id-token: write` OIDC token, not
      # trusted publishing. The steps must stay separate: `pnpm publish` skips
      # OIDC as soon as a static `_authToken` is configured (see
      # https://github.com/pnpm/pnpm/pull/11495), so the token must not be
      # visible while the natives publish.
      - name: Publish native packages (trusted publishing)
        # The trailing slash publishes the directory. The build dirs `pacquet-*`
        # are published as `@pnpm/exe.<target>`.
        env:
          TAG: ${{ inputs.tag }}
        run: |
          for package in pnpm/npm/pacquet-* pnpm/npm/napi.*; do
            pnpm publish "$package/" --tag "$TAG" --access public --provenance --no-git-checks
          done

      - name: Stage pnpm and @pnpm/exe wrappers (static token)
        env:
          TAG: ${{ inputs.tag }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          trap 'pnpm config delete "//registry.npmjs.org/:_authToken" || true' EXIT
          pnpm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}"
          for package in pnpm/npm/pnpm* pnpm/npm/napi; do
            # tee the output (which includes the stage id) into the job summary
            # so the approver doesn't have to dig through the raw log.
            pnpm stage publish "$package/" --tag "$TAG" --access public --provenance --no-git-checks | tee -a "$GITHUB_STEP_SUMMARY"
          done

  github-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the draft release and its tag
    needs:
      - build
      - publish
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Release
        # The build job's archives already carry the release layout (a `pnpm`
        # binary at the root of `pnpm-<target>.tar.gz` / `.zip`), so they're
        # uploaded byte-for-byte as attested there — get.pnpm.io's install
        # scripts fetch them by these exact names. Same battle-tested action
        # as the v11 release pipeline (release.yml). Draft so a maintainer
        # publishes it deliberately — the same proof-of-presence gate the
        # staged npm wrappers get. `make_latest: false` keeps a published v12
        # prerelease from stealing the "Latest" badge from the stable v11
        # line.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          draft: true
          prerelease: ${{ contains(inputs.version, '-') }}
          make_latest: false
          tag_name: v${{ inputs.version }}
          target_commitish: ${{ github.sha }}
          name: pnpm ${{ inputs.version }}
          files: |
            pnpm-*.tar.gz
            pnpm-*.zip
