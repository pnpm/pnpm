name: Release Pacquet

# When main is pushed and pacquet/npm/pacquet/package.json has been changed,
# trigger the jobs after the ci workflow has been passed.
on:
  push:
    branches:
      - main
    paths:
      - pacquet/npm/pacquet/package.json # Please only commit this file, so we don't need to wait for test CI to pass.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ env.version }}
      version_changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check version changes
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/pacquet@latest/package.json
          file-name: pacquet/npm/pacquet/package.json

      - name: Set version name
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_TYPE: ${{ steps.version.outputs.version_type }}
        run: |
          echo "Version change found! New version: $VERSION ($VERSION_TYPE)"
          echo "version=$VERSION" >> "$GITHUB_ENV"

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    permissions:
      contents: read
      id-token: write # needed for actions/attest-build-provenance
      attestations: write
    env:
      version: ${{ needs.check.outputs.version }}
    outputs:
      version: ${{ env.version }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            code-target: win32-x64

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            code-target: win32-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            code-target: linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            code-target: linux-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            code-target: darwin-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            code-target: darwin-arm64

    name: Package ${{ matrix.code-target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cross
        uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cross

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Build with cross
        run: cross build -p pacquet-cli --bin pacquet --release --target=${{ matrix.target }}

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      - name: Archive Binary
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN_NAME=pacquet-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pacquet.exe $BIN_NAME.exe
          7z a $BIN_NAME.zip $BIN_NAME.exe

      # The binary is zipped to fix permission loss https://github.com/actions/upload-artifact#permission-loss
      - name: Archive Binary
        if: runner.os != 'Windows'
        run: |
          BIN_NAME=pacquet-${{ matrix.code-target }}
          mv target/${{ matrix.target }}/release/pacquet $BIN_NAME
          tar czf $BIN_NAME.tar.gz $BIN_NAME

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            pacquet-${{ matrix.code-target }}*

      - name: Upload Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          if-no-files-found: error
          name: binaries-${{ matrix.code-target }}
          path: |
            *.zip
            *.tar.gz

  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      # Required for npm provenance attestations via OIDC.
      id-token: write
      # Required for softprops/action-gh-release to create the release below.
      contents: write
    needs:
      - build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm and Node
        uses: pnpm/setup@b1cac37306e39c21283b9dd6cb0ac288fb35ba6b
        with:
          runtime: node@22
          install: false

      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Unzip
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: unzip -qq *.zip -d .

      - name: Untar
        run: ls *.gz | xargs -i tar xf {}

      - name: Generate npm packages
        run: |
          node pacquet/npm/pacquet/scripts/generate-packages.mjs
          cat pacquet/npm/pacquet/package.json
          for package in pacquet/npm/pacquet*; do cat $package/package.json ; echo ; done

      - name: Publish npm packages as latest
        # Auth is via npm's trusted publishing: `id-token: write` above grants
        # this job an OIDC token that pnpm/npm exchange with the registry,
        # so no NPM_TOKEN is needed. `--provenance` attaches the same OIDC
        # token to a provenance attestation on each tarball.
        # The trailing slash on $package/ changes it to publishing the directory.
        run: |
          for package in pacquet/npm/pacquet*; do
            pnpm publish "$package/" --tag latest --access public --provenance --no-git-checks
          done

      - name: Create GitHub Release
        # `gh release create` could replace this, but the release pipeline is
        # sensitive and softprops/action-gh-release is widely battle-tested
        # (matches release.yml).
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          name: pacquet v${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          draft: true
          files: pacquet-*
          fail_on_unmatched_files: true
          generate_release_notes: true
