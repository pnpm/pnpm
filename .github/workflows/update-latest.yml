name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        required: true
      tag:
        description: Tag (use latest-<major> when tagging an older release line)
        default: latest
        required: true

permissions: {}
jobs:
  tag-in-registry:
    name: Tagging ${{ github.event.inputs.version }} as ${{ github.event.inputs.tag }}
    environment: release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - uses: garnet-org/action@2b7fc9d79b54f551b43358c27424a36064b3e078 # v2.0.2
      with:
        api_token: ${{ secrets.GARNET_API_TOKEN }}
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    # The latest-<major> tag is derived from the version instead of being
    # hardcoded per release branch, so dispatching this workflow from the wrong
    # branch cannot point a newer line's tag at an older release
    # (https://github.com/pnpm/pnpm/issues/12906).
    - name: Validate version and tag
      env:
        VERSION: ${{ github.event.inputs.version }}
        TAG: ${{ github.event.inputs.tag }}
      run: |
        if ! printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[.0-9A-Za-z-]+)?$'; then
          echo "::error::Version must be an exact semver version like 11.2.0. Got: ${VERSION}"
          exit 1
        fi
        MAJOR="${VERSION%%.*}"
        case "$TAG" in
          latest-*)
            if [ "$TAG" != "latest-${MAJOR}" ]; then
              echo "::error::Tag ${TAG} does not match the major version of ${VERSION}. Expected latest-${MAJOR}."
              exit 1
            fi
            ;;
          latest)
            CURRENT_LATEST_MAJOR="$(npm view pnpm dist-tags.latest | cut -d . -f 1)"
            if [ "$MAJOR" -lt "$CURRENT_LATEST_MAJOR" ]; then
              echo "::error::Refusing to move the latest tag back from v${CURRENT_LATEST_MAJOR} to ${VERSION}. Use latest-${MAJOR} to tag an older release line."
              exit 1
            fi
            ;;
        esac
    # The release workflow has already published this version under
    # next-<major>; moving the dist-tags below is what makes `pnpm self-update`
    # and the devEngines/packageManager download path resolve it. Upgrading onto
    # a version reads its published manifest, so a bad one only fails here, on
    # the real registry artifact — 11.12.0 published its bundled dependencies as
    # real dependencies and every upgrade onto it crashed
    # (pnpm/pnpm#12955, pnpm/pnpm#12959). This is the last gate before `latest`
    # exposes the version to everyone.
    - name: Verify upgrading onto the new version
      env:
        VERSION: ${{ github.event.inputs.version }}
      run: |
        set -eu
        MAJOR="${VERSION%%.*}"
        # Upgrade from what users on this release line are running today. A new
        # major has no latest-<major> yet, so fall back to the current latest.
        if ! FROM=$(npm view "pnpm@latest-${MAJOR}" version 2>/dev/null) || [ -z "$FROM" ]; then
          FROM=$(npm view pnpm dist-tags.latest)
        fi
        echo "Upgrading from v${FROM} to v${VERSION}"

        # Both wrappers are exercised: self-update reinstalls the package it is
        # running from, so `pnpm` and `@pnpm/exe` resolve different published
        # manifests and a broken one surfaces on only that wrapper.
        for package in pnpm @pnpm/exe; do
          work=$(mktemp -d)
          # Isolate the whole pnpm environment so the upgrade resolves and
          # installs for real instead of reusing a warm store or global dir.
          export PNPM_HOME="$work/home"
          export XDG_DATA_HOME="$work/data"
          export XDG_CACHE_HOME="$work/cache"

          npm install --prefix "$work/from" --ignore-scripts=false "${package}@${FROM}"
          case "$package" in
            pnpm) from_bin=(node "$work/from/node_modules/pnpm/bin/pnpm.mjs") ;;
            @pnpm/exe) from_bin=("$work/from/node_modules/@pnpm/exe/pnpm") ;;
          esac

          # Check the starting point separately so a previous release that is
          # itself broken fails here, with its own version in the message,
          # instead of looking like a fault in $VERSION.
          test "$("${from_bin[@]}" --version)" = "$FROM"

          ( cd "$work" && "${from_bin[@]}" self-update "$VERSION" )
          # Run the upgraded binary, not just the exit code: @pnpm/exe's
          # preinstall leaves its placeholder bin in place when the platform
          # package ships without a native, so a self-update onto a release with
          # missing natives (11.12.0, 11.13.0) still "succeeds" and only a real
          # invocation catches it.
          test "$("$PNPM_HOME/bin/pnpm" --version)" = "$VERSION"
          echo "OK: ${package}@${FROM} self-updated to v${VERSION}"
        done

    - name: Update tag
      env:
        "npm_config_//registry.npmjs.org/:_authToken": ${{ secrets.NPM_TOKEN }}
        VERSION: ${{ github.event.inputs.version }}
        TAG: ${{ github.event.inputs.tag }}
      run: |
        MAJOR="${VERSION%%.*}"
        npm dist-tag add "pnpm@${VERSION}" "latest-${MAJOR}"
        npm dist-tag add "@pnpm/exe@${VERSION}" "latest-${MAJOR}"
        if [ "$TAG" != "latest-${MAJOR}" ]; then
          npm dist-tag add "pnpm@${VERSION}" "${TAG}"
          npm dist-tag add "@pnpm/exe@${VERSION}" "${TAG}"
        fi

  publish-to-winget:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release
    needs: tag-in-registry
    steps:
      - uses: vedantmgoyal9/winget-releaser@7bd472be23763def6e16bd06cc8b1cdfab0e2fd5 # main
        with:
          identifier: pnpm.pnpm
          version: ${{ github.event.inputs.version }}
          release-tag: v${{ github.event.inputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}

  post-to-reddit:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release
    needs: tag-in-registry
    steps:
      - uses: bluwy/release-for-reddit-action@b4ee0e0d64da893e0428912aac5cda675082bd85 # v2
        with:
          username: ${{ secrets.REDDIT_USERNAME }}
          password: ${{ secrets.REDDIT_PASSWORD }}
          app-id: ${{ secrets.REDDIT_APP_ID }}
          app-secret: ${{ secrets.REDDIT_APP_SECRET }}
          subreddit: pnpm
          title: pnpm@${{ github.event.inputs.version }} is out!
          url: https://github.com/pnpm/pnpm/releases/tag/v${{ github.event.inputs.version }}

  post-to-mastodon:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release
    needs: tag-in-registry
    steps:
      - name: Send toot to Mastodon
        id: mastodon
        uses: cbrgm/mastodon-github-action@ac2d8e8c9986a17b824dd12dd9df4ce5fcd813c1 # v2.2.2
        with:
          message: |
            pnpm@${{ github.event.inputs.version }} is out!
            https://github.com/pnpm/pnpm/releases/tag/v${{ github.event.inputs.version }}
          visibility: "public"
        env:
          MASTODON_URL: "https://fosstodon.org/"
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }} # access token
